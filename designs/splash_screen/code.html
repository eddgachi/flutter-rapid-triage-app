<style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        /* Custom medical pattern background */
        .medical-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(0, 61, 155, 0.05) 1px, transparent 0);
            background-size: 32px 32px;
        }
        /* Fade-in animations */
        .animate-fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* Progress loader animation */
        .loader-ring {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e1e7;
            border-top: 3px solid #003d9b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(0, 82, 204, 0.2));
        }

<!-- Interaction & Transition Logic -->
<script>
        // Simulate real-time initialization steps for immersion
        const statusText = document.getElementById('status-text');
        const stages = [
            "Initializing Systems...",
            "Connecting to Secure Gateway...",
            "Syncing Offline Database...",
            "Validating Field Protocol..."
        ];
        
        let currentStage = 0;
        
        const updateStatus = () => {
            if (currentStage < stages.length) {
                statusText.innerText = stages[currentStage];
                currentStage++;
                setTimeout(updateStatus, 800);
            } else {
                // Flash finish effect before "redirecting"
                statusText.innerHTML = '<span class="text-secondary font-bold">READY</span>';
                document.body.classList.add('transition-opacity', 'duration-500', 'opacity-0');
                
                // Final redirect simulation after fade
                setTimeout(() => {
                    console.log("Redirecting to Dashboard...");
                    // In a real app: window.location.href = '/dashboard';
                }, 500);
            }
        };

        // Start sequence after initial animations settle
        setTimeout(updateStatus, 1500);

        // Responsive handling for touch target clarity (mobile check)
        if (window.innerWidth < 768) {
            console.log("Optimizing for mobile touch-targets...");
        }
    </script>
